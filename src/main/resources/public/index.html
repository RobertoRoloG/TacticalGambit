<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Gambit - Web Client</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <!-- Left Column: Board and Card Hand -->
        <div class="main-column">
            <!-- Board Section -->
            <div class="board-section">
                <canvas id="gameBoard" width="520" height="520"></canvas>
                <div id="gameOverOverlay" class="game-over-overlay" style="display: none;">
                    <div class="game-over-content">
                        <h2 id="gameOverTitle">GAME OVER</h2>
                        <p id="gameOverMessage"></p>
                        <button id="overlayResetBtn" class="btn btn-primary">Restart Match</button>
                    </div>
                </div>
                <div id="promotionOverlay" class="promotion-overlay" style="display: none;">
                    <div class="promotion-content">
                        <div class="promotion-inner">
                            <h2 class="promotion-title">PROMOTION</h2>
                            <div class="promotion-options" id="promotionOptions">
                                <!-- Se rellena dinámicamente con JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card Hand Section (Below board, with isolated Deck) -->
            <div class="hand-section">
                <div class="hand-header">
                    <span class="section-label">Card Hand</span>
                    <span id="handStatus"></span>
                </div>
                <div class="hand-row">
                    <!-- Deck visually isolated from hand -->
                    <div class="deck-area">
                        <div class="deck-indicator" id="deckIndicator">
                            <div class="deck-stack">
                                <img src="/assets/card_back.png" alt="Deck" class="deck-image" />
                            </div>
                            <div class="deck-info">
                                <div class="deck-count" id="deckCount">20</div>
                                <div class="deck-label">Deck</div>
                            </div>
                        </div>
                        <button id="drawBtn" class="btn-draw-deck-img" title="Draw Card (Cost: 1 💎)">
                            <img src="/assets/draw_button.png" alt="Draw (1 💎)" />
                        </button>
                    </div>
                    
                    <!-- Vertical visual divider -->
                    <div class="hand-divider"></div>
                    
                    <!-- Playable cards list -->
                    <div id="cardsList" class="cards-list">
                        <div class="card-item empty-hand" style="border: 1px dashed rgba(43,34,26,0.15); justify-content: center; align-items: center; background: none;">
                            <span style="color: var(--text-muted); font-size: 0.85rem;">Empty hand</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-panel">
            <div class="sidebar-inner-frame">
                <div class="sidebar-header">
                    <h1 class="header-title">TACTICAL GAMBIT</h1>
                    <button id="resetBtn" class="btn-reset" title="Restart Match">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                        </svg>
                    </button>
                </div>

                <!-- Match Details -->
                <div class="game-info">
                    <div class="info-row">
                        <span class="info-label">Turn</span>
                        <span id="activePlayerVal" class="info-value val-white">WHITE</span>
                    </div>
                    <div class="info-row" id="apCard">
                        <span class="info-label">Action Points</span>
                        <span id="apVal" class="info-value">3 / 5</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Physical Move</span>
                        <span id="moveStatusVal" class="info-value">
                            <span class="move-badge pending">Available</span>
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Status</span>
                        <span id="gameStateVal" class="info-value val-amber">In Progress</span>
                    </div>
                </div>

                <!-- Sidebar controls -->
                <div class="sidebar-controls">
                    <button id="passBtn" class="btn btn-primary">
                        <span>End Turn</span>
                    </button>
                </div>

                <!-- Action Log at the bottom -->
                <div class="log-section">
                    <div class="log-title">Action Log</div>
                    <div id="actionLogVal" class="log-body">Match initialized.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Container for error notifications -->
    <div id="notifications" class="notification-container"></div>

    <script src="game.js"></script>
</body>

</html>
